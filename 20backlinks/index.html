<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    flex-direction: column;
    padding: 60px 16px 40px;
    background-color: #efffed;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(26,122,10,0.35); }
    50%       { box-shadow: 0 0 0 8px rgba(26,122,10,0); }
  }
  @keyframes shimmer {
    0%   { transform: translateX(-100%) skewX(-20deg); }
    100% { transform: translateX(250%) skewX(-20deg); }
  }

  .card {
    background: #fff;
    border-radius: 20px;
    border: 1px solid #E5E5E3;
    padding: 48px 40px;
    max-width: 460px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    animation: fadeUp 0.5s ease both;
  }
  .logo { width: 68px; height: 68px; margin: 0 auto 2px; display: block; }
  .wordmark {
    font-weight: 900; font-size: 18px; color: #1C2B1A;
    letter-spacing: -0.03em; margin-bottom: 18px; margin-top: 2px;
    animation: fadeUp 0.5s 0.08s ease both;
  }
  .badge {
    display: inline-block; background: #EEFCE8; border: 1px solid #C4EDB5;
    color: #1a7a0a; font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 5px 16px; border-radius: 100px;
    margin-bottom: 20px; animation: fadeUp 0.5s 0.16s ease both;
  }
  h1 {
    font-size: clamp(34px, 6vw, 42px); font-weight: 900; line-height: 1.08;
    letter-spacing: -0.03em; color: #1C2B1A; margin-bottom: 12px;
    animation: fadeUp 0.5s 0.22s ease both;
  }
  h1 span { color: #1a7a0a; }
  .sub {
    font-size: 14px; color: #888; margin-bottom: 24px; line-height: 1.5;
    animation: fadeUp 0.5s 0.36s ease both;
  }
  .email-input {
    width: 100%; background: #FAFAFA; border: 1px solid #E0E0DE;
    border-radius: 10px; padding: 14px 16px; font-size: 15px; color: #111;
    font-family: 'Inter', sans-serif; box-sizing: border-box; transition: border-color 0.2s;
  }
  .email-input::placeholder { color: #aaa; }
  .email-input:focus { outline: none; border-color: #1a7a0a; }
  .submit-btn {
    background: #1a7a0a; color: #fff; font-size: 15px; font-weight: 700;
    border-radius: 10px; padding: 15px 24px; border: none; width: 100%;
    cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 10px;
    animation: pulse 2.2s 1s ease-in-out infinite;
    transition: background 0.2s, transform 0.1s;
    position: relative; overflow: hidden;
  }
  .submit-btn::after {
    content: ''; position: absolute; top: 0; left: 0; width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.28), transparent);
    animation: shimmer 2.8s 1.5s ease-in-out infinite;
  }
  .submit-btn:hover { background: #156008; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .divider { border: none; border-top: 1px solid #F0F0EE; margin: 20px 0; }
  .avatars {
    display: flex; align-items: center; justify-content: center;
    margin: 16px 0 10px; animation: fadeUp 0.5s 0.28s ease both;
  }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%; border: 2px solid #fff;
    margin-left: -8px; overflow: hidden; flex-shrink: 0;
  }
  .avatar:first-child { margin-left: 0; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .seen-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: #ccc; margin-bottom: 12px; }
  .seen-logos { display: flex; align-items: center; justify-content: center; gap: 20px; flex-wrap: wrap; }
  .seen-logo-img { height: 22px; width: auto; }
  .footer-note { font-size: 12px; color: #888; margin-top: 16px; text-align: center; animation: fadeUp 0.5s 0.5s ease both; }
  @media (max-width: 480px) {
    .card { padding: 36px 24px; }
    .logo { width: 56px; height: 56px; }
  }
</style>
